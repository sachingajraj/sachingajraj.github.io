<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku App</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        p {
            color: #aaa;
            margin: 20px 0;
        }
        a.button {
            display: inline-block;
            padding: 12px 20px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>S U D O K U</h1>
        <p>Train your brain with a clean and minimal Sudoku experience.</p>
        
        <a class="button" href="https://apps.apple.com/us/app/just-sudoku-classic-puzzle/id6762172260">
            Download on App Store
        </a>
    </div>

</html>
